<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New England Groove</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
  padding:20px;
}
h1 { color:#ff5a00; }
.section { margin-bottom:40px; }
.item { margin-bottom:12px; }
a { color:#fff; text-decoration:none; }
a:hover { text-decoration:underline; }
.source { font-size:12px; color:#888; }
</style>

</head>
<body>

<h1>New England Groove</h1>

<div class="section">
  <h2>Boston Tonight</h2>
  <div id="bostonTonight"></div>
</div>

<div class="section">
  <h2>Providence Weekend</h2>
  <div id="providenceWeekend"></div>
</div>

<div class="section">
  <h2>Festivals</h2>
  <div id="festivals"></div>
</div>

<div class="section">
  <h2>Top This Weekend</h2>
  <div id="topWeekend"></div>
</div>

<script>
async function loadFeed() {
  try {
    const res = await fetch('/.netlify/functions/ai-news');
    const data = await res.json();

    render('bostonTonight', data.meta.bostonTonight);
    render('providenceWeekend', data.meta.providenceWeekend);
    render('festivals', data.meta.festivals);
    render('topWeekend', data.meta.topWeekend);

  } catch (e) {
    console.error(e);
  }
}

function render(id, items) {
  const el = document.getElementById(id);
  if (!items || !el) return;

  el.innerHTML = items.map(i => `
    <div class="item">
      <a href="${i.link}" target="_blank">${i.title}</a>
      <div class="source">${i.source}</div>
    </div>
  `).join('');
}

loadFeed();
</script>

</body>
</html>
